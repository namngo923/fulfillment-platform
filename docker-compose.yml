version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: fulfillment-platform-postgres
    environment:
      POSTGRES_DB: fulfillment_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
